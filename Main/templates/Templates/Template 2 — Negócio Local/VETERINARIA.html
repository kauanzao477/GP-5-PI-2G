<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetCare — Clínica Veterinária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,900;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>

    /* ══════════════════════════════════════════
       VARIÁVEIS — edite aqui para mudar as cores
    ══════════════════════════════════════════ */
    :root {
      --verde:        #2D6A4F;
      --verde-escuro: #1B4332;
      --verde-claro:  #D8F3DC;
      --accent:       #E07A5F;
      --accent-claro: #FDEAE5;
      --fundo:        #F7FAF8;
      --card:         #FFFFFF;
      --texto:        #1C2E22;
      --texto-sub:    #5A6E5F;
      --borda:        #DCE9DF;
      --wpp:          #25D366;
      --fonte:        'Nunito', sans-serif;
      --fonte-titulo: 'Fraunces', Georgia, serif;
      --raio:         14px;
      --sombra:       0 4px 20px rgba(45,106,79,.10);
    }

    /* ══════════════ RESET ══════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { font-family:var(--fonte); background:var(--fundo); color:var(--texto); line-height:1.6; overflow-x:hidden; }
    img  { max-width:100%; display:block; }
    a    { text-decoration:none; color:inherit; }

    .container { max-width:1100px; margin:0 auto; padding:0 24px; }

    /* ══════════════ NAVBAR ══════════════ */
    .nav {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(27,67,50,.97); backdrop-filter:blur(10px);
      padding: 14px 24px;
      display: flex; align-items:center; justify-content:space-between;
      gap: 16px;
    }
    .nav-marca { display:flex; align-items:center; gap:10px; }
    .nav-icone {
      width:40px; height:40px; border-radius:10px;
      background:var(--verde); display:flex; align-items:center;
      justify-content:center; font-size:1.3rem;
    }
    .nav-nome  { font-family:var(--fonte-titulo); font-size:1.1rem; color:#fff; }
    .nav-tipo  { font-size:.68rem; color:#74C69D; text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a {
      color:rgba(255,255,255,.65); font-size:.82rem; font-weight:700;
      padding:8px 14px; border-radius:50px; transition:.25s;
    }
    .nav-links a:hover { color:#fff; background:rgba(255,255,255,.1); }
    .nav-btn {
      display:flex; align-items:center; gap:7px;
      background:var(--accent); color:#fff;
      padding:10px 22px; border-radius:50px;
      font-weight:800; font-size:.82rem; transition:.25s;
      white-space:nowrap;
    }
    .nav-btn:hover { background:#c4614a; transform:scale(1.04); }

    /* ══════════════ HERO ══════════════ */
    .hero {
      min-height:100vh; display:flex; align-items:center;
      background: linear-gradient(150deg, #0D2818 0%, #1B4332 55%, #2D6A4F 100%);
      padding: 110px 24px 72px;
      position:relative; overflow:hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(circle at 75% 40%, rgba(45,106,79,.3) 0%, transparent 55%),
        radial-gradient(circle at 10% 80%, rgba(224,122,95,.15) 0%, transparent 45%);
    }
    .hero-inner {
      max-width:1100px; margin:0 auto; width:100%;
      display:grid; grid-template-columns:1fr 1fr; gap:56px;
      align-items:center; position:relative; z-index:1;
    }

    /* conteúdo esquerdo */
    .hero-tag {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(224,122,95,.2); border:1px solid rgba(224,122,95,.35);
      color:var(--accent); padding:7px 18px; border-radius:50px;
      font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:2px;
      margin-bottom:20px;
    }
    .hero-tag-dot { width:6px; height:6px; background:#52B788; border-radius:50%; animation:pisca 2s infinite; }
    @keyframes pisca { 0%,100%{opacity:1} 50%{opacity:.15} }

    .hero h1 {
      font-family:var(--fonte-titulo); font-size:3.6rem; font-weight:600;
      color:#fff; line-height:1.08; margin-bottom:16px;
    }
    .hero h1 em { color:var(--accent); font-style:italic; }
    .hero-sub  { font-size:1.05rem; color:rgba(255,255,255,.65); margin-bottom:34px; max-width:440px; }

    .hero-botoes { display:flex; gap:12px; flex-wrap:wrap; }
    .btn-wpp {
      display:inline-flex; align-items:center; gap:9px;
      background:var(--wpp); color:#fff;
      padding:16px 34px; border-radius:50px;
      font-weight:800; font-size:.98rem; transition:.25s;
      box-shadow:0 6px 22px rgba(37,211,102,.4);
    }
    .btn-wpp:hover { background:#1EBE57; transform:translateY(-3px); }
    .btn-ghost {
      display:inline-flex; align-items:center; gap:9px;
      background:transparent; color:#fff;
      padding:16px 32px; border-radius:50px;
      font-weight:700; font-size:.95rem;
      border:2px solid rgba(255,255,255,.2); transition:.25s;
    }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

    /* stats */
    .hero-stats { display:flex; gap:28px; margin-top:36px; }
    .hero-stat-n { font-family:var(--fonte-titulo); font-size:2rem; color:#fff; line-height:1; }
    .hero-stat-l { font-size:.68rem; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:1.5px; font-weight:700; margin-top:2px; }

    /* visual direito */
    .hero-img {
      width:100%; aspect-ratio:4/5; border-radius:24px; overflow:hidden;
      background:rgba(45,106,79,.25); border:2px solid rgba(255,255,255,.1);
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:12px;
      color:rgba(255,255,255,.2); font-size:.75rem; font-weight:700;
      text-transform:uppercase; letter-spacing:1.5px;
    }
    .hero-img img  { width:100%; height:100%; object-fit:cover; }
    .hero-img span { font-size:5rem; }

    /* ══════════════ SEÇÕES GENÉRICAS ══════════════ */
    .secao      { padding:80px 24px; }
    .secao-alt  { background:#EDF3EF; }

    .secao-topo { text-align:center; margin-bottom:52px; }
    .tag-label {
      display:inline-block; background:var(--verde-claro); color:var(--verde);
      font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:2.5px;
      padding:6px 16px; border-radius:50px; margin-bottom:12px;
    }
    .secao-topo h2 {
      font-family:var(--fonte-titulo); font-size:2.4rem; font-weight:600; color:var(--texto);
    }
    .secao-topo p { font-size:.97rem; color:var(--texto-sub); margin-top:10px; max-width:500px; margin-inline:auto; }

    /* ══════════════ SOBRE ══════════════ */
    .sobre-grid { display:grid; grid-template-columns:1fr 1fr; gap:52px; align-items:center; }
    .sobre-img {
      aspect-ratio:4/5; border-radius:24px; overflow:hidden;
      background:linear-gradient(135deg, var(--verde-claro), #EDF3EF);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:10px; color:var(--texto-sub);
      font-size:.82rem; font-weight:700;
    }
    .sobre-img span  { font-size:4rem; opacity:.3; }
    .sobre-img img   { width:100%; height:100%; object-fit:cover; }

    .sobre-texto h2  { font-family:var(--fonte-titulo); font-size:2rem; font-weight:600; margin-bottom:6px; }
    .sobre-sub-label { color:var(--accent); font-weight:700; margin-bottom:18px; font-size:.97rem; }
    .sobre-p         { font-size:.94rem; color:var(--texto-sub); line-height:1.85; margin-bottom:26px; }

    .destaques { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:28px; }
    .destaque {
      display:flex; align-items:center; gap:11px;
      background:var(--fundo); border-radius:var(--raio);
      border-left:3px solid var(--verde); padding:13px 15px;
    }
    .destaque-icone {
      width:38px; height:38px; border-radius:10px;
      background:var(--verde-claro); display:flex; align-items:center;
      justify-content:center; font-size:1.1rem; flex-shrink:0;
    }
    .destaque span { font-size:.84rem; font-weight:800; }

    /* ══════════════ SERVIÇOS ══════════════ */
    .servicos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }
    .servico {
      display:flex; align-items:center; gap:15px;
      background:var(--card); border-radius:var(--raio); padding:20px 22px;
      border:2px solid var(--borda); transition:.25s; box-shadow:var(--sombra);
    }
    .servico:hover { transform:translateY(-4px); border-color:rgba(45,106,79,.25); box-shadow:0 12px 36px rgba(45,106,79,.15); }
    .servico-ico {
      width:50px; height:50px; border-radius:13px; background:var(--verde-claro);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; flex-shrink:0; transition:.25s;
    }
    .servico:hover .servico-ico { background:var(--verde); }
    .servico-nome { font-size:.97rem; font-weight:800; }
    .servico-desc { font-size:.8rem; color:var(--texto-sub); margin-top:2px; }
    .servico-preco {
      margin-left:auto; flex-shrink:0;
      background:var(--accent-claro); color:var(--accent);
      font-size:.88rem; font-weight:800; padding:5px 13px; border-radius:50px;
    }

    /* ══════════════ GALERIA ══════════════ */
    .galeria-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .galeria-item {
      border-radius:var(--raio); overflow:hidden; height:230px;
      background:linear-gradient(135deg, var(--verde-claro), #EDF3EF);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:8px; color:var(--texto-sub);
      font-size:.8rem; font-weight:700; transition:.25s; cursor:pointer;
    }
    .galeria-item:nth-child(1) { grid-column:span 2; height:300px; }
    .galeria-item:hover { transform:scale(1.02); box-shadow:var(--sombra); }
    .galeria-item span  { font-size:2.5rem; opacity:.3; }
    .galeria-item img   { width:100%; height:100%; object-fit:cover; }

    /* ══════════════ LOCALIZAÇÃO ══════════════ */
    .local-grid { display:grid; grid-template-columns:1fr 1fr; gap:40px; }
    .mapa-box {
      border-radius:24px; overflow:hidden; height:420px;
      background:linear-gradient(135deg, var(--verde-claro), #EDF3EF);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:12px; color:var(--texto-sub); font-size:.85rem; font-weight:700;
    }
    .mapa-box span  { font-size:3.5rem; opacity:.3; }
    .mapa-box iframe { width:100%; height:100%; border:0; display:block; }

    .info-cards { display:flex; flex-direction:column; gap:16px; }
    .info-card  {
      background:var(--card); border-radius:var(--raio); padding:24px;
      border:1px solid var(--borda); box-shadow:var(--sombra);
    }
    .info-card-h { display:flex; align-items:center; gap:11px; margin-bottom:16px; }
    .info-card-ico {
      width:42px; height:42px; border-radius:11px; background:var(--verde-claro);
      display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;
    }
    .info-card-h h3 { font-size:1rem; font-weight:800; }

    .endereco-txt  { font-size:.9rem; color:var(--texto-sub); line-height:1.8; }
    .endereco-txt strong { color:var(--texto); font-weight:800; }

    .horario-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 0; border-bottom:1px solid var(--borda); font-size:.87rem;
    }
    .horario-row:last-child { border-bottom:none; }
    .horario-dia { font-weight:800; }
    .horario-hr  { color:var(--texto-sub); font-weight:600; }
    .horario-hr.off { color:var(--accent); font-weight:800; }

    .contato-row  { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--borda); }
    .contato-row:last-child { border-bottom:none; }
    .contato-ico {
      width:38px; height:38px; border-radius:10px; background:var(--verde-claro);
      display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0;
    }
    .contato-label { font-size:.67rem; color:#9EB09F; text-transform:uppercase; letter-spacing:.8px; font-weight:700; }
    .contato-val   { font-size:.9rem; font-weight:800; }

    /* ══════════════ AVALIAÇÕES ══════════════ */
    .nota-box {
      display:flex; align-items:center; gap:20px; justify-content:center;
      background:var(--verde-claro); border-radius:var(--raio); padding:22px 32px;
      margin-bottom:40px;
    }
    .nota-num   { font-family:var(--fonte-titulo); font-size:3.2rem; color:var(--verde); line-height:1; }
    .nota-stars { color:#F4A261; font-size:1.3rem; margin:4px 0; }
    .nota-total { font-size:.84rem; color:var(--texto-sub); font-weight:700; }

    .aval-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .aval-card {
      background:var(--card); border-radius:var(--raio); padding:26px;
      border:1px solid var(--borda); box-shadow:var(--sombra); transition:.25s;
    }
    .aval-card:hover { transform:translateY(-4px); box-shadow:0 14px 40px rgba(45,106,79,.14); }
    .aval-stars  { color:#F4A261; font-size:.9rem; margin-bottom:10px; }
    .aval-texto  { font-size:.88rem; color:var(--texto-sub); line-height:1.75; font-style:italic; margin-bottom:16px; }
    .aval-autor  { display:flex; align-items:center; gap:11px; }
    .aval-avatar {
      width:42px; height:42px; border-radius:50%; background:var(--verde-claro);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; font-weight:800; color:var(--verde); flex-shrink:0;
    }
    .aval-nome { font-size:.88rem; font-weight:800; }
    .aval-data { font-size:.7rem; color:#9EB09F; font-weight:700; }

    /* ══════════════ CTA ══════════════ */
    .cta {
      background:linear-gradient(135deg, var(--verde) 0%, var(--verde-escuro) 100%);
      padding:72px 24px; text-align:center; color:#fff;
    }
    .cta h2 { font-family:var(--fonte-titulo); font-size:2.2rem; font-weight:600; margin-bottom:12px; }
    .cta p  { font-size:1.02rem; opacity:.8; margin-bottom:28px; }

    /* ══════════════ FOOTER ══════════════ */
    .footer {
      background:#0D2818; color:rgba(255,255,255,.35);
      padding:36px 24px; text-align:center; font-size:.84rem;
    }
    .footer-nome { font-family:var(--fonte-titulo); font-size:1.4rem; color:#fff; margin-bottom:6px; }
    .footer a    { color:#74C69D; font-weight:700; }

    /* ══════════════ WPP FLUTUANTE ══════════════ */
    .wpp-float {
      position:fixed; bottom:24px; right:24px; z-index:999;
      display:flex; flex-direction:column; align-items:flex-end; gap:8px;
    }
    .wpp-msg {
      background:#fff; padding:10px 16px; border-radius:12px;
      box-shadow:0 4px 18px rgba(0,0,0,.12);
      font-size:.8rem; font-weight:700; white-space:nowrap;
      border-left:3px solid var(--wpp);
      animation:sobe 3s ease-in-out infinite;
    }
    @keyframes sobe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .wpp-btn {
      width:64px; height:64px; border-radius:50%;
      background:var(--wpp); color:#fff; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; transition:.25s;
      box-shadow:0 4px 22px rgba(37,211,102,.5);
      animation:pulsa 2s infinite;
    }
    @keyframes pulsa {
      0%   { box-shadow:0 0 0 0 rgba(37,211,102,.55); }
      70%  { box-shadow:0 0 0 18px rgba(37,211,102,0); }
      100% { box-shadow:0 0 0 0 rgba(37,211,102,0); }
    }
    .wpp-btn:hover { transform:scale(1.1); }

    /* ══════════════ RESPONSIVO ══════════════ */
    @media(max-width:900px){
      .nav-links { display:none; }
      .hero-inner { grid-template-columns:1fr; text-align:center; gap:36px; }
      .hero h1 { font-size:2.8rem; }
      .hero-sub, .hero-botoes { margin-inline:auto; }
      .hero-botoes { justify-content:center; }
      .hero-stats  { justify-content:center; }
      .hero-img    { order:-1; max-width:320px; margin:0 auto; }
      .sobre-grid, .local-grid { grid-template-columns:1fr; }
      .aval-grid   { grid-template-columns:1fr; }
      .galeria-grid{ grid-template-columns:1fr 1fr; }
      .galeria-item:nth-child(1){ grid-column:span 2; }
    }
    @media(max-width:600px){
      .hero { padding:90px 16px 48px; min-height:auto; }
      .hero h1 { font-size:2rem; }
      .btn-wpp, .btn-ghost { width:100%; justify-content:center; }
      .servicos-grid { grid-template-columns:1fr; }
      .galeria-grid  { grid-template-columns:1fr; }
      .galeria-item:nth-child(1){ grid-column:span 1; height:240px; }
      .secao-topo h2 { font-size:1.9rem; }
      .destaques { grid-template-columns:1fr; }
      .nota-box  { flex-direction:column; text-align:center; }
      .nav-btn .nav-cta-texto { display:none; }
    }
  </style>
</head>
<body>

<script>
/*

    { "numero": "8",      "label": "Especialistas"        }  /* CAMPO: stat_3 */

  /* ── SEÇÃO SOBRE ─────────────────────────────────────────────────── */

    /* CAMPO: sobre_titulo — Título da seção sobre */

    /* CAMPO: sobre_subtitulo — Subtítulo/destaque abaixo do título */

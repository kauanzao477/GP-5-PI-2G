<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faxineira Profissional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
  --cor-primaria: #8B5CF6;
  --cor-primaria-hover: #7C3AED;
  --cor-primaria-light: #F3E8FF;
  --cor-primaria-rgb: 139, 92, 246;
  --cor-secundaria: #1E1B4B;
  --cor-secundaria-light: #3730A3;
  --cor-fundo: #FFFFFF;
  --cor-fundo-alt: #F8FAFC;
  --cor-fundo-escuro: #1E1B4B;
  --cor-fundo-card: #FFFFFF;
  --cor-texto: #1E293B;
  --cor-texto-light: #64748B;
  --cor-texto-claro: #FFFFFF;
  --cor-texto-muted: #94A3B8;
  --cor-whatsapp: #25D366;
  --cor-whatsapp-hover: #1EBE57;
  --cor-estrela: #FCD34D;
  --cor-sucesso: #10B981;
  --cor-borda: #E2E8F0;
  --sombra-card: 0 4px 20px rgba(0,0,0,0.08);
  --sombra-card-hover: 0 8px 30px rgba(0,0,0,0.15);
  --borda-raio: 16px;
  --borda-raio-grande: 24px;
  --borda-raio-botao: 50px;
  --fonte-principal: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transicao: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family: var(--fonte-principal);
  color: var(--cor-texto);
  background: var(--cor-fundo);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
img { max-width:100%; display:block; }
a { text-decoration:none; color:inherit; }

.container { 
  max-width:1000px; 
  margin:0 auto; 
  padding:0 20px; 
}

/* HEADER */
.header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:rgba(255,255,255,0.98); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--cor-borda); transition:var(--transicao);
}
.header.scrolled { box-shadow:0 4px 24px rgba(0,0,0,0.1); }
.header-inner {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; max-width:1000px; margin:0 auto;
}
.header-logo { display:flex; align-items:center; gap:12px; }
.header-logo-icon {
  width:48px; height:48px; background:linear-gradient(135deg, var(--cor-primaria), var(--cor-primaria-hover));
  border-radius:12px; display:flex; align-items:center; justify-content:center; 
  font-size:1.4rem; color:white; font-weight:800;
}
.header-logo-text h1 { font-size:1.2rem; font-weight:800; color:var(--cor-secundaria); line-height:1.2; margin:0; }
.header-logo-text span { font-size:0.8rem; color:var(--cor-primaria); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.header-cta {
  display:flex; align-items:center; gap:10px;
  background:var(--cor-whatsapp); color:white;
  padding:12px 24px; border-radius:var(--borda-raio-botao);
  font-weight:700; font-size:0.9rem; border:none; cursor:pointer;
  transition:var(--transicao); text-transform:uppercase; letter-spacing:0.5px;
}
.header-cta:hover { background:var(--cor-whatsapp-hover); transform:scale(1.05); }

/* HERO */
.hero {
  padding:140px 20px 80px;
  background:linear-gradient(135deg, var(--cor-fundo-escuro) 0%, var(--cor-secundaria-light) 100%);
  position:relative; overflow:hidden; min-height:100vh; display:flex; flex-direction:column;
}
.hero::before {
  content:''; position:absolute; top:-30%; right:-15%; width:500px; height:500px;
  background:radial-gradient(circle, rgba(var(--cor-primaria-rgb),0.2) 0%, transparent 70%);
  border-radius:50%;
}
.hero-inner {
  max-width:1000px; margin:0 auto; padding:0 20px;
  display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center;
  position:relative; z-index:2;
}
.hero-content { color:var(--cor-texto-claro); }
.hero-badge {
  display:inline-flex; align-items:center; gap:10px;
  background:rgba(var(--cor-primaria-rgb),0.2); border:1px solid rgba(var(--cor-primaria-rgb),0.4);
  padding:10px 20px; border-radius:var(--borda-raio-botao);
  font-size:0.85rem; font-weight:700; color:var(--cor-primaria);
  margin-bottom:24px; text-transform:uppercase; letter-spacing:1px;
}
.hero-badge-dot {
  width:10px; height:10px; background:var(--cor-sucesso); border-radius:50%; 
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.5);} }
.hero-nome { font-size:3.5rem; font-weight:900; line-height:1.1; margin-bottom:12px; }
.hero-profissao {
  font-size:1.4rem; color:var(--cor-primaria); font-weight:800; margin-bottom:20px; 
  text-transform:uppercase; letter-spacing:1px;
}
.hero-frase { font-size:1.8rem; font-weight:700; margin-bottom:20px; line-height:1.4; }
.hero-frase-destaque { color:var(--cor-primaria); }
.hero-subtitulo {
  font-size:1.1rem; color:rgba(255,255,255,0.8); margin-bottom:40px; line-height:1.7; max-width:450px;
}
.hero-botoes { display:flex; gap:20px; flex-wrap:wrap; }

.btn-principal {
  display:inline-flex; align-items:center; gap:12px; background:var(--cor-whatsapp); color:white;
  padding:20px 40px; border-radius:var(--borda-raio-botao); font-size:1.1rem; font-weight:800; 
  border:none; cursor:pointer; transition:var(--transicao); text-transform:uppercase; letter-spacing:0.5px;
  box-shadow:0 6px 24px rgba(37,211,102,0.4);
}
.btn-principal:hover {
  background:var(--cor-whatsapp-hover); transform:translateY(-4px); box-shadow:0 10px 35px rgba(37,211,102,0.5);
}
.btn-secundario {
  display:inline-flex; align-items:center; gap:12px; background:transparent; color:white;
  padding:20px 40px; border-radius:var(--borda-raio-botao); font-size:1.05rem; font-weight:700;
  border:2px solid rgba(255,255,255,0.3); cursor:pointer; transition:var(--transicao);
}
.btn-secundario:hover {
  border-color:var(--cor-primaria); color:var(--cor-primaria); background:rgba(var(--cor-primaria-rgb),0.15);
}

.hero-stats {
  display:flex; gap:40px; margin-top:48px; padding-top:36px; 
  border-top:1px solid rgba(255,255,255,0.15);
}
.hero-stat { text-align:center; }
.hero-stat-numero { font-size:2.2rem; font-weight:900; color:var(--cor-primaria); line-height:1; }
.hero-stat-label { font-size:0.85rem; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:1px; margin-top:6px; }

.hero-visual { display:flex; justify-content:center; align-items:center; }
.hero-foto-container {
  width:420px; height:480px; border-radius:var(--borda-raio-grande); overflow:hidden; 
  border:5px solid rgba(var(--cor-primaria-rgb),0.3);
  background:linear-gradient(135deg, rgba(var(--cor-primaria-rgb),0.25), rgba(var(--cor-primaria-rgb),0.08));
  box-shadow:var(--sombra-card-hover);
}
.hero-foto-container img { width:100%; height:100%; object-fit:cover; }
.hero-foto-placeholder {
  width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.4); gap:16px; text-align:center; padding:0 20px;
}
.hero-foto-placeholder-icon { font-size:6rem; }
.hero-foto-placeholder-text { font-size:1rem; text-transform:uppercase; letter-spacing:1px; }

/* CARDS DE SERVIÇOS */
.card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:28px; margin-top:120px; }
.card {
  background:var(--cor-fundo-card); border-radius:var(--borda-raio); padding:36px 28px; 
  text-align:center; transition:var(--transicao); border:2px solid transparent; 
  box-shadow:var(--sombra-card); position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, var(--cor-primaria), var(--cor-primaria-hover));
  transform:scaleX(0); transition:var(--transicao);
}
.card:hover {
  transform:translateY(-8px); box-shadow:var(--sombra-card-hover); border-color:rgba(var(--cor-primaria-rgb),0.2);
}
.card:hover::before { transform:scaleX(1); }
.card-icone { font-size:3.5rem; margin-bottom:20px; display:block; }
.card-titulo { font-size:1.25rem; font-weight:800; color:var(--cor-secundaria); margin-bottom:12px; }
.card-descricao { font-size:0.95rem; color:var(--cor-texto-light); line-height:1.6; }

/* WHATSAPP FLUTUANTE */
.whatsapp-float {
  position:fixed; bottom:30px; right:30px; z-index:9999;
  animation:pulse-whatsapp 2s infinite;
}
@keyframes pulse-whatsapp {
  0% { box-shadow:0 0 0 0 rgba(37,211,102,0.5); }
  70% { box-shadow:0 0 0 20px rgba(37,211,102,0); }
  100% { box-shadow:0 0 0 0 rgba(37,211,102,0); }
}
.whatsapp-float-btn {
  width:70px; height:70px; border-radius:50%; background:var(--cor-whatsapp); 
  color:white; display:flex; align-items:center; justify-content:center;
  font-size:2.2rem; border:none; cursor:pointer; box-shadow:0 6px 24px rgba(37,211,102,0.5);
  transition:var(--transicao);
}
.whatsapp-float-btn:hover { transform:scale(1.1); background:var(--cor-whatsapp-hover); }

/* RESPONSIVO */
@media (max-width:900px) {
  .hero-inner { grid-template-columns:1fr; text-align:center; gap:50px; }
  .hero-botoes { justify-content:center; }
  .hero-stats { justify-content:center; flex-wrap:wrap; gap:24px; }
  .hero-visual { order:-1; }
  .hero-foto-container { width:280px; height:320px; }
  .hero-nome { font-size:2.8rem; }
  .hero-frase { font-size:1.5rem; }
}
@media (max-width:600px) {
  .hero { padding:120px 16px 60px; }
  .hero-nome { font-size:2.2rem; }
  .hero-profissao { font-size:1.1rem; }
  .hero-frase { font-size:1.3rem; }
  .hero-stats { gap:20px; }
  .hero-foto-container { width:240px; height:280px; }
  .btn-principal, .btn-secundario { width:100%; justify-content:center; padding:18px 32px; }
  .header-cta span:last-child { display:none; }
  .whatsapp-float { bottom:20px; right:20px; }
  .whatsapp-float-btn { width:60px; height:60px; font-size:2rem; }
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const CONFIG = {
  profissional: {
    nome: "Maria Silva",
    profissao: "Faxineira Profissional",
    fraseImpacto: "Casa limpa, vida leve!",
    subtitulo: "10+ anos de experiência trazendo limpeza e organização para seu lar.",
    whatsapp: "5511999999999",
    whatsappMensagem: "Olá! Gostaria de agendar uma limpeza.",
    telefone: "(11) 99999-9999",
    foto: null,
    iconeHeader: "🧹",
  },
  estatisticas: [
    { numero: "10+", label: "Anos Exp." },
    { numero: "1.500+", label: "Casas" },
    { numero: "100%", label: "Satisfação" },
  ],
  servicos: [
    { icone: "🧹", titulo: "Limpeza Completa", descricao: "Poeira, móveis, banheiro, cozinha e pisos" },
    { icone: "🪣", titulo: "Lavagem de Pisos", descricao: "Cera, enceramento e limpeza profunda" },
    { icone: "🧼", titulo: "Banheiros", descricao: "Limpeza completa com desinfecção" },
    { icone: "🍳", titulo: "Cozinha", descricao: "Fogão, geladeira, armários e utensílios" },
    { icone: "🛏️", titulo: "Quartos", descricao: "Organização, troca de roupas de cama" },
    { icone: "🪞", titulo: "Vidros e Espelhos", descricao: "Limpeza sem manchas e brilho total" },
  ],
};

function getWhatsappLink() {
  return `https://wa.me/${CONFIG.profissional.whatsapp}?text=${encodeURIComponent(CONFIG.profissional.whatsappMensagem)}`;
}

function Header() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <header className={`header ${scrolled ? 'scrolled' : ''}`}>
      <div className="header-inner">
        <div className="header-logo">
          <div className="header-logo-icon">{CONFIG.profissional.iconeHeader}</div>
          <div className="header-logo-text">
            <h1>{CONFIG.profissional.nome}</h1>
            <span>{CONFIG.profissional.profissao}</span>
          </div>
        </div>
        <a href={getWhatsappLink()} target="_blank" rel="noopener noreferrer" className="header-cta">
          📱 Orçamento Grátis
        </a>
      </div>
    </header>
  );
}

function Hero() {
  const p = CONFIG.profissional;
  const stats = CONFIG.estatisticas;
  return (
    <section className="hero">
      <div className="hero-inner">
        <div className="hero-content">
          <div className="hero-badge">
            <span className="hero-badge-dot"></span>Disponível agora
          </div>
          <h2 className="hero-nome">{p.nome}</h2>
          <p className="hero-profissao">{p.profissao}</p>
          <h3 className="hero-frase">
            "<span className="hero-frase-destaque">{p.fraseImpacto}</span>"
          </h3>
          <p className="hero-subtitulo">{p.subtitulo}</p>
          <div className="hero-botoes">
            <a href={getWhatsappLink()} target="_blank" rel="noopener noreferrer" className="btn-principal">
              📲 Falar no WhatsApp
            </a>
            <a href="#servicos" className="btn-secundario">Ver Serviços</a>
          </div>
          <div className="hero-stats">
            {stats.map((s, i) => (
              <div className="hero-stat" key={i}>
                <div className="hero-stat-numero">{s.numero}</div>
                <div className="hero-stat-label">{s.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="hero-visual">
          <div className="hero-foto-container">
            {p.foto ? (
              <img src={p.foto} alt={p.nome} />
            ) : (
              <div className="hero-foto-placeholder">
                <span className="hero-foto-placeholder-icon">🧹</span>
                <span className="hero-foto-placeholder-text">Sua foto aqui</span>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="container" id="servicos">
        <div style={{textAlign:'center', marginBottom:'60px'}}>
          <h3 style={{fontSize:'2rem', color:'white', marginBottom:'16px', fontWeight:'900'}}>
            🧹 Meus Serviços
          </h3>
          <p style={{color:'rgba(255,255,255,0.9)', fontSize:'1.15rem', maxWidth:'600px', margin:'0 auto'}}>
            Limpeza residencial completa com qualidade e carinho
          </p>
        </div>
        <div className="card-grid">
          {CONFIG.servicos.map((s, i) => (
            <div className="card" key={i}>
              <span className="card-icone">{s.icone}</span>
              <h3 className="card-titulo">{s.titulo}</h3>
              <p className="card-descricao">{s.descricao}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="container" style={{textAlign:'center', padding:'80px 20px 40px'}}>
        <h3 style={{fontSize:'2.5rem', color:'white', marginBottom:'24px', fontWeight:'900'}}>
          Precisa de uma faxineira?
        </h3>
        <p style={{fontSize:'1.25rem', color:'rgba(255,255,255,0.9)', marginBottom:'40px', maxWidth:'500px', marginLeft:'auto', marginRight:'auto'}}>
          Fale comigo agora mesmo! Faço orçamento grátis e preço especial para primeira limpeza.
        </p>
        <a href={getWhatsappLink()} target="_blank" rel="noopener noreferrer" className="btn-principal" 
           style={{fontSize:'1.25rem', padding:'24px 56px'}}>
          📲 Chamar no WhatsApp
        </a>
      </div>
    </section>
  );
}

function WhatsAppFloat() {
  const [visivel, setVisivel] = React.useState(false);
  React.useEffect(() => {
    const timer = setTimeout(() => setVisivel(true), 2000);
    return () => clearTimeout(timer);
  }, []);
  if (!visivel) return null;
  return (
    <div className="whatsapp-float">
      <a href={getWhatsappLink()} target="_blank" rel="noopener noreferrer" className="whatsapp-float-btn">
        📱
      </a>
    </div>
  );
}

function App() {
  return (
    <>
      <Header />
      <Hero />
      <WhatsAppFloat />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

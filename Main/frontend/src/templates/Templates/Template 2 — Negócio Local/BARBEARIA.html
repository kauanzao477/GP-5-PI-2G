<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negócio Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

:root {
  /* ─── Cores Principais ─── */
  --cor-primaria: #E91E63;
  --cor-primaria-hover: #C2185B;
  --cor-primaria-light: #FCE4EC;
  --cor-primaria-rgb: 233, 30, 99;
  --cor-primaria-gradient: linear-gradient(135deg, #E91E63 0%, #AD1457 100%);

  /* ─── Cores Secundárias ─── */
  --cor-secundaria: #1B1B2F;
  --cor-secundaria-light: #2E2E48;
  --cor-accent: #FF6F00;
  --cor-accent-light: #FFF3E0;

  /* ─── Cores de Fundo ─── */
  --cor-fundo: #FFFFFF;
  --cor-fundo-alt: #FAFAFA;
  --cor-fundo-escuro: #1B1B2F;
  --cor-fundo-card: #FFFFFF;
  --cor-fundo-banner: linear-gradient(135deg, #1B1B2F 0%, #2E2E48 50%, #1B1B2F 100%);

  /* ─── Cores de Texto ─── */
  --cor-texto: #2D2D2D;
  --cor-texto-light: #6B6B6B;
  --cor-texto-claro: #FFFFFF;
  --cor-texto-muted: #9E9E9E;

  /* ─── Cores Especiais ─── */
  --cor-whatsapp: #25D366;
  --cor-whatsapp-hover: #1EBE57;
  --cor-estrela: #FFC107;
  --cor-sucesso: #4CAF50;
  --cor-preco: #E91E63;

  /* ─── Bordas e Sombras ─── */
  --cor-borda: #EEEEEE;
  --sombra-suave: 0 2px 12px rgba(0,0,0,0.06);
  --sombra-card: 0 4px 24px rgba(0,0,0,0.08);
  --sombra-card-hover: 0 12px 40px rgba(0,0,0,0.15);
  --sombra-botao: 0 6px 20px rgba(var(--cor-primaria-rgb),0.35);

  /* ─── Bordas Arredondadas ─── */
  --raio: 14px;
  --raio-grande: 24px;
  --raio-botao: 50px;
  --raio-pequeno: 8px;

  /* ─── Tipografia ─── */
  --fonte: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;

  /* ─── Espaçamentos ─── */
  --secao-padding: 90px;
  --max-largura: 1140px;

  /* ─── Transições ─── */
  --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --trans-lenta: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── RESET ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--fonte);color:var(--cor-texto);background:var(--cor-fundo);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}

.container{max-width:var(--max-largura);margin:0 auto;padding:0 20px}

/* ─── NAVBAR ─── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(27,27,47,0.95);backdrop-filter:blur(12px);
  transition:var(--trans);
}
.navbar.scrolled{box-shadow:0 4px 30px rgba(0,0,0,0.3)}
.navbar-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;max-width:var(--max-largura);margin:0 auto;
}
.navbar-brand{display:flex;align-items:center;gap:12px}
.navbar-logo{
  width:44px;height:44px;border-radius:12px;overflow:hidden;
  background:var(--cor-primaria-gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:white;flex-shrink:0;
}
.navbar-logo img{width:100%;height:100%;object-fit:cover}
.navbar-info h1{font-size:1.05rem;font-weight:800;color:white;line-height:1.2}
.navbar-info span{font-size:0.7rem;color:var(--cor-primaria);font-weight:600;text-transform:uppercase;letter-spacing:1px}

.navbar-links{display:flex;align-items:center;gap:6px}
.navbar-link{
  color:rgba(255,255,255,0.7);font-size:0.8rem;font-weight:600;
  padding:8px 14px;border-radius:var(--raio-botao);transition:var(--trans);
}
.navbar-link:hover{color:white;background:rgba(255,255,255,0.1)}

.navbar-cta{
  display:flex;align-items:center;gap:8px;
  background:var(--cor-whatsapp);color:white;
  padding:10px 22px;border-radius:var(--raio-botao);
  font-weight:700;font-size:0.82rem;border:none;cursor:pointer;
  transition:var(--trans);text-transform:uppercase;letter-spacing:0.5px;
}
.navbar-cta:hover{background:var(--cor-whatsapp-hover);transform:scale(1.05)}

/* ─── MOBILE MENU ─── */
.menu-toggle{
  display:none;background:none;border:none;cursor:pointer;
  width:36px;height:36px;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;
}
.menu-toggle span{width:22px;height:2px;background:white;border-radius:2px;transition:var(--trans)}

/* ─── BANNER / HERO ─── */
.banner{
  min-height:100vh;display:flex;align-items:center;
  background:var(--cor-fundo-banner);position:relative;overflow:hidden;
  padding:100px 20px 60px;
}
.banner-bg-pattern{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(var(--cor-primaria-rgb),0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(var(--cor-primaria-rgb),0.08) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(255,111,0,0.06) 0%, transparent 40%);
  z-index:0;
}
.banner-decor{
  position:absolute;width:300px;height:300px;border-radius:50%;
  border:1px solid rgba(var(--cor-primaria-rgb),0.1);z-index:0;
}
.banner-decor-1{top:-100px;right:-50px;width:400px;height:400px}
.banner-decor-2{bottom:-80px;left:-60px;width:250px;height:250px}

.banner-inner{
  max-width:var(--max-largura);margin:0 auto;width:100%;
  display:grid;grid-template-columns:1fr 1fr;gap:60px;
  align-items:center;position:relative;z-index:1;
}
.banner-content{color:var(--cor-texto-claro)}
.banner-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(var(--cor-primaria-rgb),0.15);
  border:1px solid rgba(var(--cor-primaria-rgb),0.25);
  padding:8px 18px;border-radius:var(--raio-botao);
  font-size:0.75rem;font-weight:700;color:var(--cor-primaria);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;
}
.banner-tag-dot{
  width:7px;height:7px;background:var(--cor-sucesso);border-radius:50%;
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.banner-titulo{font-size:3.4rem;font-weight:900;line-height:1.08;margin-bottom:12px}
.banner-titulo-destaque{
  background:var(--cor-primaria-gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.banner-slogan{
  font-size:1.25rem;font-weight:500;color:rgba(255,255,255,0.7);
  margin-bottom:12px;line-height:1.5;
}
.banner-desc{
  font-size:1rem;color:rgba(255,255,255,0.55);
  margin-bottom:36px;max-width:460px;line-height:1.7;
}
.banner-botoes{display:flex;gap:14px;flex-wrap:wrap}

.btn-whatsapp{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--cor-whatsapp);color:white;
  padding:18px 38px;border-radius:var(--raio-botao);
  font-size:1.05rem;font-weight:800;border:none;cursor:pointer;
  transition:var(--trans);text-transform:uppercase;letter-spacing:.5px;
  box-shadow:0 6px 25px rgba(37,211,102,0.4);
}
.btn-whatsapp:hover{background:var(--cor-whatsapp-hover);transform:translateY(-3px);box-shadow:0 10px 35px rgba(37,211,102,0.5)}

.btn-outline{
  display:inline-flex;align-items:center;gap:10px;
  background:transparent;color:white;
  padding:18px 38px;border-radius:var(--raio-botao);
  font-size:1rem;font-weight:700;
  border:2px solid rgba(255,255,255,0.25);cursor:pointer;transition:var(--trans);
}
.btn-outline:hover{border-color:var(--cor-primaria);color:var(--cor-primaria);background:rgba(var(--cor-primaria-rgb),0.08)}

.banner-visual{display:flex;justify-content:center;align-items:center}
.banner-foto-wrap{
  position:relative;width:420px;height:480px;
}
.banner-foto-main{
  width:100%;height:100%;border-radius:var(--raio-grande);
  overflow:hidden;border:3px solid rgba(var(--cor-primaria-rgb),0.25);
  background:rgba(var(--cor-primaria-rgb),0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.banner-foto-main img{width:100%;height:100%;object-fit:cover}
.banner-foto-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,0.25);gap:14px;
}
.banner-foto-placeholder-icon{font-size:5rem}
.banner-foto-placeholder-text{font-size:.8rem;text-transform:uppercase;letter-spacing:1px}

.banner-foto-badge{
  position:absolute;bottom:24px;left:-20px;
  background:white;border-radius:var(--raio);
  padding:16px 20px;box-shadow:var(--sombra-card-hover);
  display:flex;align-items:center;gap:12px;
  animation:float-badge 4s ease-in-out infinite;
}
@keyframes float-badge{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.banner-badge-icon{font-size:2rem}
.banner-badge-info{text-align:left}
.banner-badge-info strong{display:block;font-size:.95rem;color:var(--cor-secundaria)}
.banner-badge-info span{font-size:.75rem;color:var(--cor-texto-light)}

.banner-foto-badge2{
  position:absolute;top:30px;right:-16px;
  background:var(--cor-primaria-gradient);color:white;
  border-radius:var(--raio);padding:14px 18px;
  box-shadow:var(--sombra-card-hover);text-align:center;
  animation:float-badge 4s ease-in-out 1s infinite;
}
.banner-badge2-numero{font-size:1.8rem;font-weight:900;line-height:1}
.banner-badge2-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.9}

/* ─── SEÇÃO BASE ─── */
.secao{padding:var(--secao-padding) 20px}
.secao-cinza{background:var(--cor-fundo-alt)}
.secao-escura{background:var(--cor-fundo-escuro);color:var(--cor-texto-claro)}
.secao-primaria{background:var(--cor-primaria-gradient);color:white}

.secao-header{text-align:center;margin-bottom:55px}
.secao-header-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.75rem;font-weight:700;color:var(--cor-primaria);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;
  background:var(--cor-primaria-light);padding:6px 16px;
  border-radius:var(--raio-botao);
}
.secao-escura .secao-header-tag{background:rgba(var(--cor-primaria-rgb),0.2)}
.secao-header h2{font-size:2.4rem;font-weight:900;color:var(--cor-secundaria);line-height:1.15}
.secao-escura .secao-header h2{color:white}
.secao-header p{font-size:1.05rem;color:var(--cor-texto-light);margin-top:12px;max-width:520px;margin-left:auto;margin-right:auto}
.secao-escura .secao-header p{color:rgba(255,255,255,0.55)}

/* ─── SOBRE ─── */
.sobre-grid{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center}
.sobre-imagem{
  border-radius:var(--raio-grande);overflow:hidden;
  height:400px;box-shadow:var(--sombra-card);
  background:var(--cor-fundo-alt);position:relative;
}
.sobre-imagem img{width:100%;height:100%;object-fit:cover}
.sobre-imagem-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--cor-texto-muted);gap:10px;
}
.sobre-imagem-placeholder-icon{font-size:4rem;opacity:.3}

.sobre-conteudo h2{font-size:2rem;font-weight:900;color:var(--cor-secundaria);margin-bottom:8px;line-height:1.2}
.sobre-conteudo .sobre-sub{font-size:1rem;color:var(--cor-primaria);font-weight:600;margin-bottom:20px}
.sobre-conteudo .sobre-texto{font-size:.95rem;color:var(--cor-texto-light);line-height:1.8;margin-bottom:28px}

.sobre-destaques{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.sobre-destaque{
  display:flex;align-items:center;gap:12px;
  background:var(--cor-fundo-alt);padding:14px 16px;border-radius:var(--raio);
}
.sobre-destaque-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--cor-primaria-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.sobre-destaque-text{font-size:.85rem;font-weight:700;color:var(--cor-secundaria)}

/* ─── SERVIÇOS ─── */
.servicos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.servico-item{
  display:flex;align-items:center;gap:16px;
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:22px 24px;transition:var(--trans);
  border:2px solid transparent;position:relative;overflow:hidden;
  box-shadow:var(--sombra-suave);
}
.servico-item::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--cor-primaria-gradient);transform:scaleY(0);
  transition:var(--trans);transform-origin:bottom;
}
.servico-item:hover{
  transform:translateY(-4px);box-shadow:var(--sombra-card-hover);
  border-color:rgba(var(--cor-primaria-rgb),0.15);
}
.servico-item:hover::after{transform:scaleY(1)}

.servico-icone{
  width:52px;height:52px;border-radius:14px;
  background:var(--cor-primaria-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;flex-shrink:0;transition:var(--trans);
}
.servico-item:hover .servico-icone{background:var(--cor-primaria);transform:scale(1.1)}
.servico-item:hover .servico-icone span{filter:brightness(10)}

.servico-info{flex:1}
.servico-nome{font-size:1rem;font-weight:700;color:var(--cor-secundaria);margin-bottom:2px}
.servico-desc{font-size:.82rem;color:var(--cor-texto-light);line-height:1.4}
.servico-preco{
  font-size:1.05rem;font-weight:800;color:var(--cor-preco);
  white-space:nowrap;flex-shrink:0;
  background:var(--cor-primaria-light);padding:6px 14px;
  border-radius:var(--raio-botao);
}

/* ─── GALERIA ─── */
.galeria-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.galeria-item{
  border-radius:var(--raio);overflow:hidden;
  height:250px;position:relative;cursor:pointer;
  background:var(--cor-fundo-alt);transition:var(--trans);
}
.galeria-item:hover{transform:scale(1.03);box-shadow:var(--sombra-card-hover)}
.galeria-item:nth-child(1){grid-column:span 2;height:320px}
.galeria-item img{width:100%;height:100%;object-fit:cover;transition:var(--trans-lenta)}
.galeria-item:hover img{transform:scale(1.08)}
.galeria-item-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--cor-texto-muted);gap:8px;font-size:.8rem;
}
.galeria-item-placeholder-icon{font-size:2.5rem;opacity:.3}
.galeria-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.7));
  padding:20px;color:white;transform:translateY(100%);transition:var(--trans);
}
.galeria-item:hover .galeria-overlay{transform:translateY(0)}
.galeria-overlay span{font-size:.85rem;font-weight:600}

/* ─── LOCALIZAÇÃO ─── */
.local-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.local-mapa{
  border-radius:var(--raio-grande);overflow:hidden;
  height:420px;box-shadow:var(--sombra-card);
  background:var(--cor-fundo-alt);
}
.local-mapa iframe{width:100%;height:100%;border:0}
.local-mapa-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--cor-texto-muted);gap:10px;
}
.local-mapa-placeholder-icon{font-size:4rem;opacity:.3}
.local-mapa-placeholder-text{font-size:.85rem}

.local-info{display:flex;flex-direction:column;gap:20px}
.local-card{
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:28px;box-shadow:var(--sombra-suave);
}
.local-card-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.local-card-icon{
  width:48px;height:48px;border-radius:14px;
  background:var(--cor-primaria-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.local-card-header h3{font-size:1.1rem;font-weight:800;color:var(--cor-secundaria)}

.local-endereco{font-size:.92rem;color:var(--cor-texto-light);line-height:1.7}
.local-endereco strong{color:var(--cor-secundaria)}

.horario-linha{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--cor-borda);font-size:.9rem;
}
.horario-linha:last-child{border-bottom:none}
.horario-dia{font-weight:700;color:var(--cor-secundaria)}
.horario-hora{color:var(--cor-texto-light)}
.horario-hora.fechado{color:var(--cor-primaria);font-weight:600}

.local-contato-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--cor-borda);
}
.local-contato-item:last-child{border-bottom:none}
.local-contato-icon{
  width:42px;height:42px;border-radius:12px;
  background:var(--cor-primaria-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
}
.local-contato-label{font-size:.7rem;color:var(--cor-texto-muted);text-transform:uppercase;letter-spacing:.5px}
.local-contato-valor{font-size:.92rem;font-weight:700;color:var(--cor-secundaria)}

/* ─── AVALIAÇÕES ─── */
.avaliacoes-topo{
  text-align:center;margin-bottom:40px;
  background:rgba(var(--cor-primaria-rgb),0.08);
  padding:24px;border-radius:var(--raio);
}
.avaliacoes-nota{font-size:3rem;font-weight:900;color:var(--cor-primaria);line-height:1}
.avaliacoes-estrelas{color:var(--cor-estrela);font-size:1.4rem;margin:6px 0}
.avaliacoes-total{font-size:.85rem;color:var(--cor-texto-light)}

.avaliacoes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.avaliacao-card{
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:28px;box-shadow:var(--sombra-suave);
  transition:var(--trans);position:relative;
}
.avaliacao-card:hover{transform:translateY(-4px);box-shadow:var(--sombra-card-hover)}
.avaliacao-card::before{
  content:'"';position:absolute;top:12px;right:20px;
  font-size:4rem;color:var(--cor-primaria);opacity:.1;
  font-family:Georgia,serif;line-height:1;
}
.avaliacao-estrelas{color:var(--cor-estrela);font-size:.9rem;margin-bottom:12px}
.avaliacao-texto{font-size:.9rem;color:var(--cor-texto-light);line-height:1.7;margin-bottom:18px;font-style:italic}
.avaliacao-autor{display:flex;align-items:center;gap:12px}
.avaliacao-avatar{
  width:44px;height:44px;border-radius:50%;overflow:hidden;
  background:var(--cor-primaria-light);display:flex;align-items:center;
  justify-content:center;font-size:1.1rem;font-weight:800;
  color:var(--cor-primaria);flex-shrink:0;
}
.avaliacao-avatar img{width:100%;height:100%;object-fit:cover}
.avaliacao-nome{font-size:.88rem;font-weight:700;color:var(--cor-secundaria)}
.avaliacao-data{font-size:.72rem;color:var(--cor-texto-muted)}

/* ─── CTA FINAL ─── */
.cta-secao{
  background:var(--cor-primaria-gradient);
  padding:70px 20px;text-align:center;color:white;
  position:relative;overflow:hidden;
}
.cta-secao::before{
  content:'';position:absolute;top:-50%;right:-20%;
  width:500px;height:500px;border-radius:50%;
  background:rgba(255,255,255,0.05);
}
.cta-secao h2{font-size:2.2rem;font-weight:900;margin-bottom:10px;position:relative;z-index:1}

.wpp-float{

  box-shadow:0 4px 20px rgba(37,211,102,0.5);

          <div className="avaliacoes-nota">{av.notaGeral}</div>
          <div className="avaliacoes-estrelas">★★★★★</div>
          <div className="avaliacoes-total">Baseado em {av.totalAvaliacoes} avaliações</div>
        </div>

        <div className="avaliacoes-grid">
          {av.lista.map((a, i) => (
            <div className="avaliacao-card" key={i}>
              <div className="avaliacao-estrelas">
                {'★'.repeat(a.estrelas)}{'☆'.repeat(5 - a.estrelas)}
              </div>
              <p className="avaliacao-texto">"{a.texto}"</p>
              <div className="avaliacao-autor">
                <div className="avaliacao-avatar">
                  {a.foto ? <img src={a.foto} alt={a.nome} /> : a.nome.charAt(0)}
                </div>
                <div>
                  <div className="avaliacao-nome">{a.nome}</div>
                  <div className="avaliacao-data">{a.data}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── CTA FINAL ───
function CTAFinal() {
  return (
    <section className="cta-secao">
      <div className="container">
        <h2>Pronto para agendar?</h2>
        <p>Fale conosco agora pelo WhatsApp. Atendimento rápido e sem compromisso!</p>
        <a href={getWppLink()} target="_blank" rel="noopener noreferrer" className="btn-whatsapp">
          <span>📲</span> Chamar no WhatsApp
        </a>
      </div>
    </section>
  );
}

// ─── FOOTER ───
function Footer() {
  const ano = new Date().getFullYear();
  const n = CONFIG.negocio;
  const redes = {
    instagram: { url: n.instagram, icone: '📸' },
    facebook: { url: n.facebook, icone: '👤' },
    youtube: { url: n.youtube, icone: '🎬' },
    tiktok: { url: n.tiktok, icone: '🎵' },
  };
  const temRedes = Object.values(redes).some(r => r.url);

  return (
    <footer className="footer">
      {temRedes && (
        <div className="footer-social">
          {Object.entries(redes).map(([key, r]) => {
            if (!r.url) return null;
            return (
              <a key={key} href={r.url} target="_blank" rel="noopener noreferrer" title={key}>
                {r.icone}
              </a>
            );
          })}
        </div>
      )}
      <p>© {ano} <a href="#inicio">{n.nome}</a> — {n.tipo}</p>
      <p style={{marginTop:'4px',fontSize:'.73rem',opacity:.5}}>Todos os direitos reservados</p>
    </footer>
  );
}

// ─── WHATSAPP FLUTUANTE ───
function WppFloat() {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setShow(true), 2500);
    return () => clearTimeout(t);
  }, []);
  if (!show) return null;

  return (
    <div className="wpp-float">
      <div className="wpp-float-msg">💬 Agende seu horário!</div>
      <a href={getWppLink()} target="_blank" rel="noopener noreferrer" className="wpp-float-btn" aria-label="WhatsApp">
        📱
      </a>
    </div>
  );
}

// ─── APP ───
function App() {
  return (
    <div>
      <Navbar />
      <Banner />
      <Sobre />
      <Servicos />
      <Galeria />
      <Localizacao />
      <Avaliacoes />
      <CTAFinal />
      <Footer />
      <WppFloat />
    </div>
  );
}

// ─── RENDER ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>

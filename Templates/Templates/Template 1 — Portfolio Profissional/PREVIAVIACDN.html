<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio Profissional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ╔══════════════════════════════════════════════════════════╗ */
/* ║  🎨 VARIÁVEIS — ALTERE AQUI PARA MUDAR TODO O VISUAL    ║ */
/* ╚══════════════════════════════════════════════════════════╝ */
:root {
  /* ─── Cor Principal ─── */
  --cor-primaria: #1A56DB;
  --cor-primaria-hover: #1648B8;
  --cor-primaria-light: #EBF2FF;
  --cor-primaria-rgb: 26, 86, 219;
  --cor-primaria-gradient: linear-gradient(135deg, #1A56DB 0%, #0E3FA3 100%);

  /* ─── Cor Secundária / Accent ─── */
  --cor-accent: #0EA5E9;
  --cor-accent-light: #E0F2FE;
  --cor-accent-rgb: 14, 165, 233;

  /* ─── Fundos ─── */
  --cor-fundo: #FFFFFF;
  --cor-fundo-alt: #F8FAFC;
  --cor-fundo-hero: linear-gradient(160deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
  --cor-fundo-card: #FFFFFF;
  --cor-fundo-escuro: #0F172A;

  /* ─── Textos ─── */
  --cor-texto: #1E293B;
  --cor-texto-light: #64748B;
  --cor-texto-claro: #FFFFFF;
  --cor-texto-muted: #94A3B8;

  /* ─── Especiais ─── */
  --cor-whatsapp: #25D366;
  --cor-whatsapp-hover: #1EBE57;
  --cor-sucesso: #10B981;
  --cor-barra-fundo: #E2E8F0;
  --cor-link: #1A56DB;

  /* ─── Bordas e Sombras ─── */
  --cor-borda: #E2E8F0;
  --cor-borda-light: #F1F5F9;
  --sombra-sutil: 0 1px 3px rgba(0,0,0,0.04);
  --sombra-card: 0 4px 20px rgba(0,0,0,0.06);
  --sombra-card-hover: 0 12px 40px rgba(0,0,0,0.12);
  --sombra-foto: 0 8px 30px rgba(0,0,0,0.3);

  /* ─── Raios ─── */
  --raio: 12px;
  --raio-grande: 20px;
  --raio-botao: 10px;
  --raio-pill: 50px;
  --raio-foto: 50%;

  /* ─── Tipografia ─── */
  --fonte: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;

  /* ─── Espaçamentos ─── */
  --secao-padding: 80px;
  --max-largura: 820px;
  --max-largura-larga: 1000px;

  /* ─── Transições ─── */
  --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  /* ─── Barra de Habilidade ─── */
  --barra-altura: 10px;
  --barra-raio: 50px;
}

/* ─── RESET ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:var(--fonte);color:var(--cor-texto);
  background:var(--cor-fundo-alt);line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* ─── NAVBAR ─── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  transition:var(--trans);
}
.nav.solid{
  background:rgba(15,23,42,0.95);backdrop-filter:blur(14px);
  box-shadow:0 2px 20px rgba(0,0,0,0.15);
}
.nav-inner{
  max-width:var(--max-largura-larga);margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
}
.nav-name{
  font-size:.95rem;font-weight:800;color:white;
  display:flex;align-items:center;gap:8px;
}
.nav-name-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--cor-primaria);
}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{
  color:rgba(255,255,255,0.6);font-size:.8rem;font-weight:600;
  padding:8px 14px;border-radius:var(--raio-botao);transition:var(--trans);
}
.nav-link:hover{color:white;background:rgba(255,255,255,0.08)}
.nav-cta{
  display:flex;align-items:center;gap:6px;
  background:var(--cor-primaria);color:white;
  padding:9px 20px;border-radius:var(--raio-botao);
  font-weight:700;font-size:.8rem;transition:var(--trans);
  border:none;cursor:pointer;
}
.nav-cta:hover{background:var(--cor-primaria-hover);transform:scale(1.03)}

/* ─── HERO ─── */
.hero{
  background:var(--cor-fundo-hero);
  padding:130px 24px 80px;
  text-align:center;color:var(--cor-texto-claro);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(var(--cor-primaria-rgb),0.12) 0%, transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(var(--cor-accent-rgb),0.08) 0%, transparent 50%);
}
.hero-inner{position:relative;z-index:1;max-width:var(--max-largura);margin:0 auto}

.hero-foto-wrap{
  width:160px;height:160px;border-radius:var(--raio-foto);
  margin:0 auto 28px;position:relative;
}
.hero-foto-ring{
  position:absolute;inset:-6px;border-radius:var(--raio-foto);
  background:var(--cor-primaria-gradient);padding:4px;
  animation:ring-rotate 8s linear infinite;
}
@keyframes ring-rotate{
  0%{background:linear-gradient(0deg,var(--cor-primaria),var(--cor-accent))}
  50%{background:linear-gradient(180deg,var(--cor-primaria),var(--cor-accent))}
  100%{background:linear-gradient(360deg,var(--cor-primaria),var(--cor-accent))}
}
.hero-foto-ring-inner{
  width:100%;height:100%;border-radius:var(--raio-foto);
  background:var(--cor-fundo-escuro);
}
.hero-foto{
  width:160px;height:160px;border-radius:var(--raio-foto);
  overflow:hidden;position:relative;z-index:1;
  box-shadow:var(--sombra-foto);
  background:var(--cor-primaria-light);
}
.hero-foto img{width:100%;height:100%;object-fit:cover}
.hero-foto-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--cor-primaria);gap:6px;background:var(--cor-primaria-light);
}
.hero-foto-placeholder-icon{font-size:3.5rem}
.hero-foto-placeholder-text{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--cor-texto-muted)}

.hero-status{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.25);
  padding:6px 16px;border-radius:var(--raio-pill);
  font-size:.72rem;font-weight:700;color:var(--cor-sucesso);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;
}
.hero-status-dot{
  width:7px;height:7px;background:var(--cor-sucesso);
  border-radius:50%;animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hero-nome{font-size:2.8rem;font-weight:900;line-height:1.1;margin-bottom:10px}
.hero-profissao{
  font-size:1.15rem;font-weight:600;
  background:var(--cor-primaria-gradient);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:10px;
}
.hero-objetivo{
  font-size:1rem;color:rgba(255,255,255,0.55);
  max-width:480px;margin:0 auto 32px;line-height:1.7;
}

.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--cor-primaria-gradient);color:white;
  padding:15px 32px;border-radius:var(--raio-botao);
  font-size:.92rem;font-weight:700;border:none;cursor:pointer;
  transition:var(--trans);box-shadow:0 4px 15px rgba(var(--cor-primaria-rgb),0.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(var(--cor-primaria-rgb),0.45)}
.btn-wpp{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--cor-whatsapp);color:white;
  padding:15px 32px;border-radius:var(--raio-botao);
  font-size:.92rem;font-weight:700;border:none;cursor:pointer;
  transition:var(--trans);box-shadow:0 4px 15px rgba(37,211,102,0.35);
}
.btn-wpp:hover{background:var(--cor-whatsapp-hover);transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,0.45)}
.btn-outline-light{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;color:white;
  padding:15px 32px;border-radius:var(--raio-botao);
  font-size:.92rem;font-weight:700;
  border:2px solid rgba(255,255,255,0.2);cursor:pointer;transition:var(--trans);
}
.btn-outline-light:hover{border-color:var(--cor-primaria);background:rgba(var(--cor-primaria-rgb),0.1)}

.hero-info-bar{
  display:flex;justify-content:center;gap:40px;
  margin-top:40px;padding-top:28px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.hero-info-item{text-align:center}
.hero-info-valor{font-size:1.5rem;font-weight:900;color:white;line-height:1}
.hero-info-label{font-size:.7rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* ─── CONTAINER PRINCIPAL ─── */
.main-container{
  max-width:var(--max-largura);margin:0 auto;
  padding:0 24px;position:relative;
}

/* ─── SEÇÕES ─── */
.secao{padding:var(--secao-padding) 0}
.secao-titulo{margin-bottom:36px}
.secao-titulo-label{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.72rem;font-weight:700;color:var(--cor-primaria);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;
  background:var(--cor-primaria-light);padding:5px 14px;
  border-radius:var(--raio-pill);
}
.secao-titulo h2{font-size:1.7rem;font-weight:900;color:var(--cor-texto);line-height:1.2}
.secao-titulo p{font-size:.92rem;color:var(--cor-texto-light);margin-top:6px}
.secao-divider{
  width:100%;height:1px;
  background:var(--cor-borda);
}

/* ─── SOBRE MIM ─── */
.sobre-card{
  background:var(--cor-fundo-card);border-radius:var(--raio-grande);
  padding:36px;box-shadow:var(--sombra-card);
  border:1px solid var(--cor-borda-light);
}
.sobre-texto{
  font-size:.95rem;color:var(--cor-texto-light);
  line-height:1.9;margin-bottom:28px;
}
.sobre-destaques{display:flex;flex-wrap:wrap;gap:10px}
.sobre-destaque{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--cor-fundo-alt);border:1px solid var(--cor-borda);
  padding:10px 18px;border-radius:var(--raio-pill);
  font-size:.82rem;font-weight:700;color:var(--cor-texto);
  transition:var(--trans);
}
.sobre-destaque:hover{
  border-color:var(--cor-primaria);
  background:var(--cor-primaria-light);
  color:var(--cor-primaria);
}
.sobre-destaque-icon{font-size:1.1rem}

/* ─── EXPERIÊNCIA ─── */
.timeline{position:relative;padding-left:32px}
.timeline::before{
  content:'';position:absolute;left:7px;top:8px;bottom:8px;
  width:2px;background:var(--cor-borda);
}
.timeline-item{position:relative;margin-bottom:32px}
.timeline-item:last-child{margin-bottom:0}
.timeline-dot{
  position:absolute;left:-32px;top:6px;
  width:16px;height:16px;border-radius:50%;
  background:var(--cor-primaria-light);
  border:3px solid var(--cor-primaria);z-index:1;
  transition:var(--trans);
}
.timeline-item:hover .timeline-dot{
  background:var(--cor-primaria);
  box-shadow:0 0 0 5px var(--cor-primaria-light);
}
.timeline-card{
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:24px 28px;box-shadow:var(--sombra-sutil);
  border:1px solid var(--cor-borda-light);
  transition:var(--trans);
}
.timeline-card:hover{
  box-shadow:var(--sombra-card);
  border-color:rgba(var(--cor-primaria-rgb),0.15);
  transform:translateX(4px);
}
.timeline-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:16px;margin-bottom:8px;flex-wrap:wrap;
}
.timeline-cargo{font-size:1.05rem;font-weight:800;color:var(--cor-texto)}
.timeline-periodo{
  font-size:.75rem;font-weight:700;color:var(--cor-primaria);
  background:var(--cor-primaria-light);padding:4px 12px;
  border-radius:var(--raio-pill);white-space:nowrap;
}
.timeline-empresa{
  font-size:.88rem;font-weight:600;color:var(--cor-texto-light);
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
}
.timeline-empresa-icon{font-size:1rem}
.timeline-desc{font-size:.85rem;color:var(--cor-texto-light);line-height:1.7}
.timeline-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.timeline-tag{
  font-size:.7rem;font-weight:600;
  background:var(--cor-fundo-alt);color:var(--cor-texto-muted);
  padding:4px 10px;border-radius:var(--raio-pill);
  border:1px solid var(--cor-borda);
}

/* ─── FORMAÇÃO ─── */
.formacao-grid{display:flex;flex-direction:column;gap:16px}
.formacao-card{
  display:flex;align-items:center;gap:20px;
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:24px;box-shadow:var(--sombra-sutil);
  border:1px solid var(--cor-borda-light);transition:var(--trans);
}
.formacao-card:hover{
  box-shadow:var(--sombra-card);
  border-color:rgba(var(--cor-primaria-rgb),0.15);
}
.formacao-icone{
  width:56px;height:56px;border-radius:14px;
  background:var(--cor-primaria-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;flex-shrink:0;
}
.formacao-info{flex:1}
.formacao-curso{font-size:1rem;font-weight:800;color:var(--cor-texto);margin-bottom:2px}
.formacao-instituicao{font-size:.85rem;color:var(--cor-texto-light);display:flex;align-items:center;gap:4px}
.formacao-ano{
  font-size:.75rem;font-weight:700;color:var(--cor-primaria);
  background:var(--cor-primaria-light);padding:4px 12px;
  border-radius:var(--raio-pill);white-space:nowrap;flex-shrink:0;
}

/* ─── HABILIDADES ─── */
.hab-modos{display:flex;gap:8px;margin-bottom:24px}
.hab-modo-btn{
  padding:8px 18px;border-radius:var(--raio-pill);
  font-size:.8rem;font-weight:700;border:2px solid var(--cor-borda);
  background:transparent;color:var(--cor-texto-light);
  cursor:pointer;transition:var(--trans);
}
.hab-modo-btn.active{
  background:var(--cor-primaria);color:white;
  border-color:var(--cor-primaria);
}
.hab-modo-btn:hover:not(.active){border-color:var(--cor-primaria);color:var(--cor-primaria)}

/* Modo barras */
.hab-barras{display:flex;flex-direction:column;gap:18px}
.hab-barra-item{
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:18px 22px;box-shadow:var(--sombra-sutil);
  border:1px solid var(--cor-borda-light);
}
.hab-barra-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.hab-barra-nome{font-size:.9rem;font-weight:700;color:var(--cor-texto)}
.hab-barra-pct{font-size:.8rem;font-weight:800;color:var(--cor-primaria)}
.hab-barra-track{
  width:100%;height:var(--barra-altura);
  background:var(--cor-barra-fundo);border-radius:var(--barra-raio);
  overflow:hidden;
}
.hab-barra-fill{
  height:100%;border-radius:var(--barra-raio);
  background:var(--cor-primaria-gradient);
  transition:width 1.2s cubic-bezier(0.4,0,0.2,1);
}

/* Modo tags */
.hab-tags{display:flex;flex-wrap:wrap;gap:10px}
.hab-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--cor-fundo-card);border:2px solid var(--cor-borda);
  padding:12px 20px;border-radius:var(--raio-pill);
  font-size:.85rem;font-weight:700;color:var(--cor-texto);
  transition:var(--trans);cursor:default;
}
.hab-tag:hover{
  border-color:var(--cor-primaria);
  background:var(--cor-primaria-light);
  color:var(--cor-primaria);
  transform:translateY(-2px);
}
.hab-tag-icon{font-size:1.1rem}
.hab-tag-nivel{
  font-size:.65rem;font-weight:800;
  background:var(--cor-primaria-light);color:var(--cor-primaria);
  padding:3px 8px;border-radius:var(--raio-pill);
}

/* ─── CONTATO ─── */
.contato-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  margin-bottom:24px;
}
.contato-card{
  display:flex;align-items:center;gap:16px;
  background:var(--cor-fundo-card);border-radius:var(--raio);
  padding:22px;box-shadow:var(--sombra-sutil);
  border:1px solid var(--cor-borda-light);transition:var(--trans);
}
.contato-card:hover{box-shadow:var(--sombra-card);border-color:rgba(var(--cor-primaria-rgb),0.15)}
.contato-card-icon{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.contato-card-icon.wpp{background:rgba(37,211,102,0.1)}
.contato-card-icon.tel{background:var(--cor-primaria-light)}
.contato-card-icon.email{background:var(--cor-accent-light)}
.contato-card-icon.local{background:#FEF3C7}
.contato-label{font-size:.7rem;color:var(--cor-texto-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.contato-valor{font-size:.92rem;font-weight:700;color:var(--cor-texto)}

.contato-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-download{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--cor-fundo-card);color:var(--cor-primaria);
  padding:15px 32px;border-radius:var(--raio-botao);
  font-size:.92rem;font-weight:700;
  border:2px solid var(--cor-primaria);cursor:pointer;transition:var(--trans);
}
.btn-download:hover{background:var(--cor-primaria);color:white}

/* ─── FOOTER ─── */
.footer{
  background:var(--cor-fundo-escuro);color:rgba(255,255,255,0.4);
  padding:30px 24px;text-align:center;font-size:.82rem;
  margin-top:20px;
}
.footer a{color:var(--cor-primaria);font-weight:600}
.footer-social{display:flex;justify-content:center;gap:12px;margin-bottom:14px}
.footer-social a{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.06);border-radius:50%;
  font-size:1.1rem;transition:var(--trans);
}
.footer-social a:hover{background:var(--cor-primaria);color:white;transform:translateY(-2px)}

/* ─── WPP FLUTUANTE ─── */
.wpp-float{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
}
.wpp-float-msg{
  background:white;color:var(--cor-texto);
  padding:10px 16px;border-radius:var(--raio);
  box-shadow:var(--sombra-card);font-size:.78rem;font-weight:600;
  white-space:nowrap;animation:wpp-anim 3s ease-in-out infinite;
}
@keyframes wpp-anim{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.wpp-float-btn{
  width:60px;height:60px;border-radius:50%;
  background:var(--cor-whatsapp);color:white;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;border:none;cursor:pointer;
  box-shadow:0 4px 18px rgba(37,211,102,0.45);
  transition:var(--trans);animation:wpp-pulse 2s infinite;
}
@keyframes wpp-pulse{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,0.5)}
  70%{box-shadow:0 0 0 16px rgba(37,211,102,0)}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}
}
.wpp-float-btn:hover{transform:scale(1.1);background:var(--cor-whatsapp-hover)}

/* ─── RESPONSIVO ─── */
@media(max-width:768px){
  :root{--secao-padding:55px}
  .nav-links{display:none}
  .hero{padding:110px 20px 60px}
  .hero-nome{font-size:2rem}
  .hero-profissao{font-size:1rem}
  .hero-info-bar{gap:24px;flex-wrap:wrap}
  .hero-btns{flex-direction:column;align-items:center}
  .btn-primary,.btn-wpp,.btn-outline-light{width:100%;justify-content:center}
  .contato-grid{grid-template-columns:1fr}
  .contato-btns{flex-direction:column}
  .btn-download,.contato-btns .btn-wpp{width:100%;justify-content:center}
  .timeline{padding-left:28px}
  .secao-titulo h2{font-size:1.5rem}
  .hero-foto-wrap{width:130px;height:130px}
  .hero-foto{width:130px;height:130px}
  .formacao-card{flex-direction:column;align-items:flex-start;gap:12px}
  .formacao-ano{align-self:flex-start}
  .sobre-card{padding:24px}
  .nav-cta span.nav-cta-label{display:none}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

/* ╔════════════════════════════════════════════════════════════════╗ */
/* ║  📝 CONFIGURAÇÃO — ALTERE TODAS AS INFORMAÇÕES AQUI           ║ */
/* ╚════════════════════════════════════════════════════════════════╝ */

const CONFIG = {

  // ─── DADOS PESSOAIS ───
  pessoal: {
    nome: "Ana Beatriz Silva",
    profissao: "Assistente Administrativa",
    objetivo: "Profissional dedicada buscando oportunidade para aplicar minha experiência em rotinas administrativas, atendimento ao público e organização.",
    status: "Disponível para contratação",  // texto do badge verde
    foto: null,  // Ex: "fotos/perfil.jpg"
    whatsapp: "5511999999999",
    whatsappMensagem: "Olá! Vi seu currículo online e gostaria de conversar sobre uma oportunidade.",
    telefone: "(11) 99999-9999",
    email: "anabeatriz.silva@email.com",
    cidade: "São Paulo, SP",
    linkedin: "",       // Ex: "https://linkedin.com/in/anabeatriz"
    github: "",
    instagram: "",
    curriculoPDF: null,  // Ex: "arquivos/curriculo.pdf"
  },

  // ─── MINI STATS DO HERO ───
  heroStats: [
    { valor: "5+",  label: "Anos Exp." },
    { valor: "3",   label: "Empresas" },
    { valor: "100%", label: "Dedicação" },
  ],

  // ─── SOBRE MIM (texto gerado pela IA) ───
  sobre: {
    texto: "Sou uma profissional comprometida com mais de 5 anos de experiência em rotinas administrativas, atendimento ao cliente e organização de documentos. Possuo facilidade em aprender novas ferramentas e me adaptar a diferentes ambientes de trabalho. Busco constantemente me aprimorar e contribuir de forma positiva com a equipe. Sou conhecida por minha pontualidade, proatividade e capacidade de resolver problemas com eficiência.",
    destaques: [
      { icone: "⏰", texto: "Pontual" },
      { icone: "🏆", texto: "Experiente" },
      { icone: "🚀", texto: "Proativa" },
      { icone: "💬", texto: "Comunicativa" },
      { icone: "📋", texto: "Organizada" },
      { icone: "🤝", texto: "Trabalho em equipe" },
    ],
  },

  // ─── EXPERIÊNCIA PROFISSIONAL ───
  experiencias: [
    {
      cargo: "Assistente Administrativa",
      empresa: "Empresa ABC Ltda",
      periodo: "Jan 2022 – Atual",
      descricao: "Responsável pela organização de documentos, controle de agenda, atendimento telefônico, emissão de notas fiscais e suporte às áreas financeira e de RH. Implementei um novo sistema de arquivo digital que reduziu o tempo de busca de documentos em 40%.",
      tags: ["Administrativo", "Financeiro", "Atendimento"],
    },
    {
      cargo: "Recepcionista",
      empresa: "Clínica Saúde & Vida",
      periodo: "Mar 2019 – Dez 2021",
      descricao: "Atendimento ao público presencial e por telefone, agendamento de consultas, organização de prontuários e controle de entrada e saída de pacientes. Reconhecida pela excelência no atendimento.",
      tags: ["Recepção", "Agendamento", "Atendimento"],
    },
    {
      cargo: "Auxiliar Administrativo",
      empresa: "Comércio Silva & Filhos",
      periodo: "Jun 2017 – Fev 2019",
      descricao: "Apoio nas atividades de controle de estoque, emissão de boletos, atendimento a fornecedores e clientes, e organização do escritório.",
      tags: ["Estoque", "Boletos", "Organização"],
    },
  ],

  // ─── FORMAÇÃO ───
  formacao: [
    {
      curso: "Administração de Empresas",
      tipo: "Graduação (Cursando)",
      instituicao: "Universidade Paulista – UNIP",
      ano: "2023 – 2026",
      icone: "🎓",
    },
    {
      curso: "Técnico em Administração",
      tipo: "Curso Técnico",
      instituicao: "ETEC de São Paulo",
      ano: "2016 – 2017",
      icone: "📚",
    },
    {
      curso: "Excel Avançado",
      tipo: "Curso Livre",
      instituicao: "Senac",
      ano: "2020",
      icone: "📊",
    },
  ],

  // ─── HABILIDADES ───
  // nivel: porcentagem (0-100) para o modo barra
  // nivelTexto: "Básico", "Intermediário", "Avançado" para o modo tags
  habilidades: [
    { nome: "Atendimento ao Público",  icone: "💬", nivel: 95, nivelTexto: "Avançado" },
    { nome: "Pacote Office",           icone: "💻", nivel: 80, nivelTexto: "Avançado" },
    { nome: "Excel",                   icone: "📊", nivel: 75, nivelTexto: "Intermediário" },
    { nome: "Organização",             icone: "📋", nivel: 90, nivelTexto: "Avançado" },
    { nome: "Redação",                 icone: "✍️",  nivel: 70, nivelTexto: "Intermediário" },
    { nome: "Trabalho em Equipe",      icone: "🤝", nivel: 90, nivelTexto: "Avançado" },
    { nome: "Redes Sociais",           icone: "📱", nivel: 65, nivelTexto: "Intermediário" },
    { nome: "Informática Geral",       icone: "🖥️", nivel: 80, nivelTexto: "Avançado" },
  ],

  // ─── MODO INICIAL DAS HABILIDADES ───
  // "barras" ou "tags"
  habilidadesModoInicial: "barras",
};


/* ╔══════════════════════════════════════════════════════════════╗ */
/* ║  🧩 COMPONENTES — NÃO PRECISA ALTERAR ABAIXO               ║ */
/* ╚══════════════════════════════════════════════════════════════╝ */

function getWppLink() {
  return `https://wa.me/${CONFIG.pessoal.whatsapp}?text=${encodeURIComponent(CONFIG.pessoal.whatsappMensagem)}`;
}

// ─── NAVBAR ───
function Navbar() {
  const [solid, setSolid] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setSolid(window.scrollY > 80);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <nav className={`nav ${solid ? 'solid' : ''}`}>
      <div className="nav-inner">
        <div className="nav-name">
          <span className="nav-name-dot"></span>
          {CONFIG.pessoal.nome.split(' ')[0]} {CONFIG.pessoal.nome.split(' ').slice(-1)[0]}
        </div>
        <div className="nav-links">
          <a href="#sobre" className="nav-link">Sobre</a>
          <a href="#experiencia" className="nav-link">Experiência</a>
          <a href="#formacao" className="nav-link">Formação</a>
          <a href="#habilidades" className="nav-link">Habilidades</a>
          <a href="#contato" className="nav-link">Contato</a>
        </div>
        <a href="#contato" className="nav-cta">
          <span>✉️</span>
          <span className="nav-cta-label">Contato</span>
        </a>
      </div>
    </nav>
  );
}

// ─── HERO ───
function Hero() {
  const p = CONFIG.pessoal;
  const stats = CONFIG.heroStats;

  return (
    <section className="hero" id="inicio">
      <div className="hero-inner">

        <div className="hero-foto-wrap">
          <div className="hero-foto-ring"><div className="hero-foto-ring-inner"></div></div>
          <div className="hero-foto">
            {p.foto ? (
              <img src={p.foto} alt={p.nome} />
            ) : (
              <div className="hero-foto-placeholder">
                <span className="hero-foto-placeholder-icon">👤</span>
                <span className="hero-foto-placeholder-text">Sua foto</span>
              </div>
            )}
          </div>
        </div>

        <div className="hero-status">
          <span className="hero-status-dot"></span>
          {p.status}
        </div>

        <h1 className="hero-nome">{p.nome}</h1>
        <p className="hero-profissao">{p.profissao}</p>
        <p className="hero-objetivo">{p.objetivo}</p>

        <div className="hero-btns">
          <a href={getWppLink()} target="_blank" rel="noopener noreferrer" className="btn-wpp">
            <span>📲</span> WhatsApp
          </a>
          <a href="#contato" className="btn-primary">
            <span>✉️</span> Entrar em Contato
          </a>
          {p.curriculoPDF && (
            <a href={p.curriculoPDF} download className="btn-outline-light">
              <span>📄</span> Baixar Currículo
            </a>
          )}
        </div>

        {stats && stats.length > 0 && (
          <div className="hero-info-bar">
            {stats.map((s, i) => (
              <div className="hero-info-item" key={i}>
                <div className="hero-info-valor">{s.valor}</div>
                <div className="hero-info-label">{s.label}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </section>
  );
}

// ─── SOBRE ───
function Sobre() {
  const s = CONFIG.sobre;

  return (
    <section className="secao" id="sobre">
      <div className="main-container">
        <div className="secao-titulo">
          <span className="secao-titulo-label">👤 Sobre</span>
          <h2>Sobre Mim</h2>
        </div>
        <div className="sobre-card">
          <p className="sobre-texto">{s.texto}</p>
          <div className="sobre-destaques">
            {s.destaques.map((d, i) => (
              <span className="sobre-destaque" key={i}>
                <span className="sobre-destaque-icon">{d.icone}</span>
                {d.texto}
              </span>
            ))}
          </div>
        </div>
        <div className="secao-divider" style={{marginTop:'var(--secao-padding)'}}></div>
      </div>
    </section>
  );
}

// ─── EXPERIÊNCIA ───
function Experiencia() {
  const exps = CONFIG.experiencias;
  if (!exps || exps.length === 0) return null;

  return (
    <section className="secao" id="experiencia" style={{paddingTop:0}}>
      <div className="main-container">
        <div className="secao-titulo">
          <span className="secao-titulo-label">💼 Carreira</span>
          <h2>Experiência Profissional</h2>
          <p>Minha trajetória profissional</p>
        </div>
        <div className="timeline">
          {exps.map((exp, i) => (
            <div className="timeline-item" key={i}>
              <div className="timeline-dot"></div>
              <div className="timeline-card">
                <div className="timeline-header">
                  <span className="timeline-cargo">{exp.cargo}</span>
                  <span className="timeline-periodo">{exp.periodo}</span>
                </div>
                <div className="timeline-empresa">
                  <span className="timeline-empresa-icon">🏢</span>
                  {exp.empresa}
                </div>
                <p className="timeline-desc">{exp.descricao}</p>
                {exp.tags && exp.tags.length > 0 && (
                  <div className="timeline-tags">
                    {exp.tags.map((tag, j) => (
                      <span className="timeline-tag" key={j}>{tag}</span>
                    ))}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
        <div className="secao-divider" style={{marginTop:'var(--secao-padding)'}}></div>
      </div>
    </section>
  );
}

// ─── FORMAÇÃO ───
function Formacao() {
  const lista = CONFIG.formacao;
  if (!lista || lista.length === 0) return null;

  return (
    <section className="secao" id="formacao" style={{paddingTop:0}}>
      <div className="main-container">
        <div className="secao-titulo">
          <span className="secao-titulo-label">🎓 Educação</span>
          <h2>Formação Acadêmica</h2>
          <p>Meus estudos e certificações</p>
        </div>
        <div className="formacao-grid">
          {lista.map((f, i) => (
            <div className="formacao-card" key={i}>
              <div className="formacao-icone">{f.icone}</div>
              <div className="formacao-info">
                <div className="formacao-curso">{f.curso}</div>
                <div className="formacao-instituicao">
                  🏫 {f.instituicao}
                  {f.tipo && <span style={{color:'var(--cor-texto-muted)',fontSize:'.78rem'}}> • {f.tipo}</span>}
                </div>
              </div>
              <span className="formacao-ano">{f.ano}</span>
            </div>
          ))}
        </div>
        <div className="secao-divider" style={{marginTop:'var(--secao-padding)'}}></div>
      </div>
    </section>
  );
}

// ─── HABILIDADES ───
function Habilidades() {
  const habs = CONFIG.habilidades;
  const [modo, setModo] = React.useState(CONFIG.habilidadesModoInicial || 'barras');
  const [animado, setAnimado] = React.useState(false);

  React.useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) setAnimado(true);
      },
      { threshold: 0.2 }
    );
    const el = document.getElementById('habilidades');
    if (el) obs.observe(el);
    return () => obs.disconnect();
  }, []);

  if (!habs || habs.length === 0) return null;

  return (
    <section className="secao" id="habilidades" style={{paddingTop:0}}>
      <div className="main-container">
        <div className="secao-titulo">
          <span className="secao-titulo-label">⚡ Skills</span>
          <h2>Habilidades</h2>
          <p>Minhas principais competências</p>
        </div>

        <div className="hab-modos">
          <button className={`hab-modo-btn ${modo === 'barras' ? 'active' : ''}`} onClick={() => setModo('barras')}>
            📊 Barras
          </button>
          <button className={`hab-modo-btn ${modo === 'tags' ? 'active' : ''}`} onClick={() => setModo('tags')}>
            🏷️ Tags
          </button>
        </div>

        {modo === 'barras' ? (
          <div className="hab-barras">
            {habs.map((h, i) => (
              <div className="hab-barra-item" key={i}>
                <div className="hab-barra-header">
                  <span className="hab-barra-nome">{h.icone} {h.nome}</span>
                  <span className="hab-barra-pct">{h.nivel}%</span>
                </div>
                <div className="hab-barra-track">
                  <div
                    className="hab-barra-fill"
                    style={{ width: animado ? `${h.nivel}%` : '0%' }}
                  ></div>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="hab-tags">
            {habs.map((h, i) => (
              <span className="hab-tag" key={i}>
                <span className="hab-tag-icon">{h.icone}</span>
                {h.nome}
                <span className="hab-tag-nivel">{h.nivelTexto}</span>
              </span>
            ))}
          </div>
        )}

        <div className="secao-divider" style={{marginTop:'var(--secao-padding)'}}></div>
      </div>
    </section>
  );
}

// ─── CONTATO ───
function Contato() {
  const p = CONFIG.pessoal;

  return (
    <section className="secao" id="contato" style={{paddingTop:0}}>
      <div className="main-container">
        <div className="secao-titulo">
          <span className="secao-titulo-label">📬 Contato</span>
          <h2>Entre em Contato</h2>
          <p>Ficarei feliz em conversar sobre oportunidades</p>
        </div>

        <div className="contato-grid">
          <div className="contato-card">
            <div className="contato-card-icon wpp">📱</div>
            <div>
              <div className="contato-label">WhatsApp</div>
              <div className="contato-valor">{p.telefone}</div>
            </div>
          </div>
          <div className="contato-card">
            <div className="contato-card-icon tel">📞</div>
            <div>
              <div className="contato-label">Telefone</div>
              <div className="contato-valor">{p.telefone}</div>
            </div>
          </div>
          <div className="contato-card">
            <div className="contato-card-icon email">✉️</div>
            <div>
              <div className="contato-label">E-mail</div>
              <div className="contato-valor" style={{fontSize:'.82rem'}}>{p.email}</div>
            </div>
          </div>
          <div className="contato-card">
            <div className="contato-card-icon local">📍</div>
            <div>
              <div className="contato-label">Localização</div>
              <div className="contato-valor">{p.cidade}</div>
            </div>
          </div>
        </div>

        <div className="contato-btns">
          <a href={getWppLink()} target="_blank" rel="noopener noreferrer" className="btn-wpp">
            <span>📲</span> Chamar no WhatsApp
          </a>
          <a href={`mailto:${p.email}`} className="btn-primary">
            <span>✉️</span> Enviar E-mail
          </a>
          {p.curriculoPDF && (
            <a href={p.curriculoPDF} download className="btn-download">
              <span>📄</span> Baixar Currículo PDF
            </a>
          )}
        </div>
      </div>
    </section>
  );
}

// ─── FOOTER ───
function Footer() {
  const ano = new Date().getFullYear();
  const p = CONFIG.pessoal;
  const redes = [
    { url: p.linkedin, icone: '💼', label: 'LinkedIn' },
    { url: p.github, icone: '💻', label: 'GitHub' },
    { url: p.instagram, icone: '📸', label: 'Instagram' },
  ];
  const temRedes = redes.some(r => r.url);

  return (
    <footer className="footer">
      {temRedes && (
        <div className="footer-social">
          {redes.map((r, i) => {
            if (!r.url) return null;
            return (
              <a key={i} href={r.url} target="_blank" rel="noopener noreferrer" title={r.label}>
                {r.icone}
              </a>
            );
          })}
        </div>
      )}
      <p>© {ano} <a href="#inicio">{p.nome}</a></p>
      <p style={{marginTop:'4px',fontSize:'.72rem',opacity:.5}}>
        Currículo online • {p.profissao}
      </p>
    </footer>
  );
}

// ─── WPP FLUTUANTE ───
function WppFloat() {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setShow(true), 2500);
    return () => clearTimeout(t);
  }, []);
  if (!show) return null;

  return (
    <div className="wpp-float">
      <div className="wpp-float-msg">💬 Fale comigo!</div>
      <a href={getWppLink()} target="_blank" rel="noopener noreferrer" className="wpp-float-btn" aria-label="WhatsApp">
        📱
      </a>
    </div>
  );
}

// ─── APP ───
function App() {
  return (
    <div>
      <Navbar />
      <Hero />
      <Sobre />
      <Experiencia />
      <Formacao />
      <Habilidades />
      <Contato />
      <Footer />
      <WppFloat />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
